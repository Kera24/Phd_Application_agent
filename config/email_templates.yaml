# Email structure + tone rules. Two templates selected by opportunity_type.
# The LLM is instructed with these constraints; the quality gate enforces them.

shared_constraints:
  body_word_min: 120
  body_word_max: 180
  subject_max_words: 9
  tone: professional, direct, specific
  forbid:
    - flattery padding
    - buzzword strings
    - generic openings ("I came across your profile")
  must:
    - cite at least one verified recent paper by exact title
    - state one concrete gap / open question grounded in their work
    - state one angle Raj could contribute, tied to his real background
    - name the professor correctly
    - only claims traceable to profile.yaml

# Project-to-lab matching guidance given to the drafting model.
project_matching:
  medical_imaging: vindr_mammo            # VinDr-Mammo, breast cancer, explainability
  computer_vision: vpr_contrastive        # Nordland / contrastive / representation
  representation_learning: vpr_contrastive
  interpretability: sae_superposition
  nlp: rag_llm
  llm: rag_llm

templates:
  advertised:
    subject_hint: "Mention the specific position; <=9 words."
    structure:
      - "Specific opening: position/lab/professor + one recent verified paper or theme."
      - "One sentence on a gap or open question in their recent work."
      - "One sentence on the angle Raj could explore, tied to his actual background."
      - "Two sentences max on Raj's relevant credentials (matched project only)."
      - "Clear ask: PhD supervision / application consideration + availability for a short call."
      - "Attachment list."
    default_attachments: [cv, transcript, summary_pdf]

  speculative:
    subject_hint: "Include 'Prospective PhD applicant' + topic; <=9 words."
    structure:
      - "Specific opening grounded in one recent verified paper/theme (never 'do you have openings' first)."
      - "One sentence connecting that theme to a gap + the angle Raj could explore."
      - "Two sentences max on Raj's relevant credentials (matched project only)."
      - "Honest ask: seeking a FULLY FUNDED PhD; do they anticipate openings in the coming intake, or can they advise on upcoming funded calls (DAAD/MSCA/ERC/EPSRC/SNSF/ARC as relevant)?"
      - "Offer to send further materials / availability for a short call."
      - "Attachment list (CV + tailored summary by default; transcript on request)."
    default_attachments: [cv, summary_pdf]   # transcript only on request — lighter speculative email

# Phase 3 — short, polite reminder for an unanswered first-contact email.
# Subject is "Re: <original subject>"; no new claims, no re-attached documents.
followup:
  subject_hint: "Reply on the original thread: 'Re: <original subject>'."
  structure:
    - "Warm one-line reference to the earlier email (no guilt, no pressure)."
    - "One sentence restating genuine interest in a PhD with the group."
    - "Offer to share any further materials that would help; thank them for their time."
  default_attachments: []   # a reminder carries no attachments
